name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  workflow_dispatch:

jobs:
  lint:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install dev dependencies
        run: pip install -r requirements-dev.txt
      - name: Syntax gate (all addons)
        run: python -m compileall -q .
      - name: Manifest sanity
        run: python tools/ci/check_manifests.py .
      - name: JSON validity
        run: |
          python - <<'EOF'
          import json, pathlib, sys
          bad = []
          for p in [*pathlib.Path("mappings").glob("*.json"),
                    *pathlib.Path("docs").glob("*.json"),
                    *pathlib.Path("tools").glob("*.json")]:
              try:
                  json.loads(p.read_text(encoding="utf-8"))
              except Exception as exc:
                  bad.append(f"{p}: {exc}")
          if bad:
              print("\n".join(bad))
              sys.exit(1)
          EOF
      - name: ODA conformance docs in sync
        run: python tools/gen_oda_conformance.py --check
      - name: Controller coverage reports (informational)
        run: |
          python tools/audit_controllers.py . | tee audit-controllers.txt || true
          python tools/audit_gaps.py . | tee audit-gaps.txt || true
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: lint-reports
          path: audit-*.txt
          retention-days: 14

  install-and-test:
    needs: lint
    runs-on: ubuntu-latest
    timeout-minutes: 60
    container:
      image: odoo:19
      options: --user root
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: odoo
          POSTGRES_PASSWORD: odoo
          POSTGRES_DB: postgres
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      DB_ARGS: --db_host postgres --db_port 5432 --db_user odoo --db_password odoo
      TMF_BASE_URL: http://localhost:8069
      ODOO_DB: tmf_ci
      ODOO_USER: admin
      ODOO_PASS: admin
      ODOO_PASSWORD: admin
    steps:
      - uses: actions/checkout@v4
      - name: Install test dependencies
        run: pip3 install --break-system-packages -r requirements-dev.txt
      - name: Compute install list
        run: |
          INSTALL_LIST=$(python3 tools/ci/compute_install_list.py .)
          echo "module count: $(echo "$INSTALL_LIST" | tr ',' '\n' | wc -l)"
          echo "INSTALL_LIST=$INSTALL_LIST" >> "$GITHUB_ENV"
      - name: Install all addons (registry build gate)
        run: |
          odoo $DB_ARGS --addons-path "$GITHUB_WORKSPACE" \
            -d tmf_ci -i "$INSTALL_LIST" \
            --stop-after-init --log-level=warn --logfile "$PWD/odoo-install.log"
          python3 tools/ci/check_odoo_log.py odoo-install.log
      - name: Start Odoo server
        run: |
          odoo $DB_ARGS --addons-path "$GITHUB_WORKSPACE" \
            -d tmf_ci --http-port 8069 --logfile "$PWD/odoo-server.log" &
          for i in $(seq 1 60); do
            if curl -fsS http://localhost:8069/web/health >/dev/null 2>&1; then
              echo "Odoo is up after ${i} polls"; exit 0
            fi
            sleep 2
          done
          echo "Odoo did not become healthy in time"; tail -50 odoo-server.log; exit 1
      - name: Seed demo data
        run: python3 mock_oss/seed_demo_data.py --host localhost --port 8069 --db tmf_ci --user admin --password admin
      - name: TMF API smoke suite
        run: python3 tools/tmf_api_smoke.py --config tools/tmf_api_smoke.sample.json | tee smoke-report.txt
      - name: Pytest — root business scenarios
        run: python3 -m pytest tests --ignore=tests/b2c_e2e --ignore=tests/b2c_advanced --junitxml junit-root.xml
      # iteration 2: start mock_oss/oss_simulator.py in the background and drop the marker filter
      - name: Pytest — b2c end-to-end (non-e2e markers)
        run: python3 -m pytest tests/b2c_e2e -m "not e2e" --junitxml junit-b2c-e2e.xml
      - name: Pytest — b2c advanced (xfail-tracked contract)
        run: python3 -m pytest tests/b2c_advanced --junitxml junit-b2c-advanced.xml
      - name: Server log scan (informational)
        if: always()
        run: python3 tools/ci/check_odoo_log.py odoo-server.log || true
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: run-logs
          path: |
            odoo-install.log
            odoo-server.log
            smoke-report.txt
            junit-*.xml
          retention-days: 14
