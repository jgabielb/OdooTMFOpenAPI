[pytest]
markers =
    smoke:          Fast, critical-path tests
    e2e:            Full end-to-end happy path
    happy_path:     Happy-path scenario
    catalog:        TMF620 ProductCatalog
    order:          TMF622 ProductOrdering — creation
    order_state:    TMF622 ProductOrdering — state transitions
    orchestration:  TMF641 ServiceOrdering
    activation:     TMF622/TMF678 — completion + invoice
    credit_check:   TMF645 CreditManagement
    resilience:     Failure + rollback scenarios
addopts = -ra --tb=short
