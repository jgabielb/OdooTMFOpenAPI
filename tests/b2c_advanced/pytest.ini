[pytest]
markers =
    product_design:   TMF620 ProductSpec / Offering / bundle / resource spec
    variants:         Same spec, different characteristic values
    inventory:        TMF639 ResourceInventory + stock.lot
    multi_account:    One partner → multiple accounts
    plan_change:      Upgrade / downgrade / modify
    promotion:        Promotion apply/swap/remove
    device_exchange:  CPE swap on active service
    sva:              Value-added service add-ons
    address_change:   Service relocation
    owner_change:     Account ownership transfer
    data_integrity:   Cross-system consistency
addopts = -ra --tb=short
